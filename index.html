const CSV_HEADER_ALIASES = {
  name: "name", membername: "name", member: "name",
  tc: "tc", tclevel: "tc", townhall: "tc", th: "tc",
  available: "available", availability: "available",
  role: "role",
  alliance: "alliance",
  team: "team",
  primarytarget: "primaryTarget", target: "primaryTarget", primarytargets: "primaryTarget",
  notes: "notes", note: "notes",
};

function normalizeHeader(h) { return h.trim().toLowerCase().replace(/[^a-z]/g, ""); }

function parseCSVLine(line) {
  const result = [];
  let cur = "", inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') { if (line[i + 1] === '"') { cur += '"'; i++; } else inQuotes = false; }
      else cur += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ",") { result.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if (!lines.length) return [];
  const headers = parseCSVLine(lines[0]).map(h => CSV_HEADER_ALIASES[normalizeHeader(h)] || null);
  return lines.slice(1).map(line => {
    const values = parseCSVLine(line);
    const row = {};
    headers.forEach((key, i) => { if (key) row[key] = (values[i] || "").trim(); });
    return row;
  });
}

function matchOption(value, options, fallback) {
  if (!value) return fallback;
  const v = value.trim().toLowerCase();
  return options.find(o => o.toLowerCase() === v) || fallback;
}

function rowToMember(row) {
  if (!row.name) return null;

    alliance: row.alliance || "",
    team: row.team || "",
    primaryTarget: matchOption(row.primaryTarget, PRIMARY_TARGETS, "Castle"),
    notes: row.notes || "",
  };
}

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  const toHex = x => Math.round(255 * x).toString(16).padStart(2, "0");
  return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
}

// ── CSV Upload ───────────────────────────────────────────────────────────────
function CsvUploadButton({ onImport }) {
  const fileRef = useRef(null);
  const [status, setStatus] = useState(null);

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const rows = parseCSV(evt.target.result);
        const newMembers = rows.map(rowToMember).filter(Boolean);
        if (newMembers.length) { onImport(newMembers); setStatus({ count: newMembers.length }); }
        else setStatus({ count: 0, error: "No valid rows found (need a 'name' column)" });
      } catch {
        setStatus({ count: 0, error: "Could not parse that CSV" });
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  return (
    <div style={{ display: "inline-flex", flexDirection: "column", gap: 4, verticalAlign: "top" }}>
      <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{ display: "none" }} />
      <button onClick={() => fileRef.current?.click()} style={{ ...btnSt, background: C.blueDim, color: C.blue, padding: "7px 20px", fontWeight: 700, fontSize: 13, fontFamily: "'Roboto Condensed', 'Arial Narrow', sans-serif", letterSpacing: 0.5 }}>

          {status.error || `Imported ${status.count} member${status.count === 1 ? "" : "s"}`}
        </span>
      )}

  );
}

// ── Tile Assignment Panel ──────────────────────────────────────────────────
function TilePanel({ modal, members, assignments, onFriendly, onEnemy, onClear, onClose, isMobile }) {
  const [tab, setTab] = useState("friendly");
  const [sel, setSel] = useState("");
  const [en, setEn] = useState({ name: "", kingdom: "", threat: "Scout", notes: "" });
  const existing = modal?.existing;
  const assignedIds = new Set(Object.values(assignments).filter(a => a.type === "friendly").map(a => a.member.id));
  if (!modal) return null;
  const panelStyle = isMobile ? {
    position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 200,
    background: "#0d1520f8", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
    border: `1px solid ${C.accent}66`, borderRadius: "18px 18px 0 0",
    padding: 20, maxHeight: "70vh", overflowY: "auto",
    boxShadow: "0 -8px 40px rgba(0,0,0,0.5)",
  } : {
    background: C.panel, border: `2px solid ${C.accent}88`,
    borderRadius: 10, padding: 20, width: 285, flexShrink: 0,
  };
  return (
    <>
      {isMobile && <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 199 }} />}
      <div style={panelStyle}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span style={{ fontFamily: "'Bebas Neue'", fontSize: 20, color: C.accent, letterSpacing: 1 }}>TILE [{modal.r},{modal.c}]</span>
        <button onClick={onClose} style={{ ...btnSt, padding: "2px 9px", fontSize: 13 }}>✕</button>
      </div>
      {existing && (
        <div style={{ background: existing.type === "friendly" ? "#0a2a4a" : C.redDim, border: `1px solid ${existing.type === "friendly" ? C.blue : C.red}55`, borderRadius: 6, padding: "8px 12px", marginBottom: 12 }}>
          <div style={{ fontWeight: 700, color: existing.type === "friendly" ? C.blue : C.red, fontSize: 13, marginBottom: 4 }}>
            {existing.type === "friendly" ? `🤝 ${existing.member.name}` : `⚔ ${existing.name || "Enemy"}`}
          </div>
          {existing.type === "friendly" && <div style={{ fontSize: 11, color: C.textDim }}>{existing.member.role} · {existing.member.alliance}</div>}
          {existing.type === "enemy" && existing.kingdom && <div style={{ fontSize: 11, color: C.textDim }}>{existing.kingdom} · {existing.threat}</div>}
          <button onClick={() => onClear(modal.r, modal.c)} style={{ ...btnSt, background: C.redDim, color: C.red, marginTop: 8, width: "100%", padding: 4, fontSize: 11 }}>Clear Tile</button>
        </div>
      )}
      <div style={{ display: "flex", gap: 4, marginBottom: 14 }}>
        {["friendly","enemy"].map(t => (
          <button key={t} onClick={() => setTab(t)} style={{ ...btnSt, flex: 1, textTransform: "capitalize", background: tab === t ? (t === "friendly" ? "#0a2a4a" : C.redDim) : "#1a2a3a", color: tab === t ? (t === "friendly" ? C.blue : C.red) : C.textDim }}>
            {t === "friendly" ? "🤝 Friendly" : "⚔ Enemy"}
          </button>
        ))}
      </div>
      {tab === "friendly" && (
        <>
          <div style={{ fontSize: 10, color: C.textDim, marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.8 }}>Select member</div>
          <select style={{ ...inputSt, marginBottom: 10 }} value={sel} onChange={e => setSel(e.target.value)}>
            <option value="">-- Choose member --</option>
            {members.map(m => <option key={m.id} value={m.id}>{m.name} ({m.alliance}){assignedIds.has(m.id) ? " ★" : ""}</option>)}
          </select>
          {sel && (() => { const m = members.find(x => x.id === +sel); return m ? (
            <div style={{ background: "#0a1820", borderRadius: 6, padding: "10px 12px", marginBottom: 12, fontSize: 11 }}>
              <div style={{ fontWeight: 800, color: C.text, marginBottom: 6 }}>{m.name}</div>
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                <Pill color={roleColor(m.role)}>{m.role === "Rally Leader" ? "Leader" : "Joiner"}</Pill>
                <Pill color={allianceColor(m.alliance)}>{m.alliance || "—"}</Pill>
                <Pill color={m.available ? C.green : C.red}>{m.available ? "Avail." : "Busy"}</Pill>
              </div>
            </div>
          ) : null; })()}
          <button onClick={() => sel && onFriendly(modal.r, modal.c, +sel)} disabled={!sel}
            style={{ ...btnSt, width: "100%", background: sel ? "#0a2a4a" : "#1a2a3a", color: sel ? C.blue : C.textDim, padding: 8, fontWeight: 800 }}>
            Assign to Tile

        </>
      )}
      {tab === "enemy" && (
        <>
          {[["name","Enemy Name","e.g. KingSlayer"],["kingdom","Kingdom / Alliance","e.g. K99 · Alliance"]].map(([k,label,ph]) => (
            <div key={k} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: C.textDim, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.8 }}>{label}</div>
              <input style={inputSt} placeholder={ph} value={en[k]} onChange={e => setEn(p => ({ ...p, [k]: e.target.value }))} />
            </div>
          ))}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: C.textDim, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.8 }}>Threat Type</div>
            <select style={inputSt} value={en.threat} onChange={e => setEn(p => ({ ...p, threat: e.target.value }))}>{THREAT_TYPES.map(t => <option key={t}>{t}</option>)}</select>
          </div>
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 10, color: C.textDim, marginBottom: 3, textTransform: "uppercase", letterSpacing: 0.8 }}>Notes</div>
            <input style={inputSt} placeholder="Additional intel..." value={en.notes} onChange={e => setEn(p => ({ ...p, notes: e.target.value }))} />
          </div>
          <button onClick={() => onEnemy(modal.r, modal.c, en)} style={{ ...btnSt, width: "100%", background: C.redDim, color: C.red, padding: 8, fontWeight: 800 }}>Mark as Enemy</button>
        </>
      )}
    </div>
    </>
  );
}

function BattleGuide() {
  const [guideImages, setGuideImages] = useState({ joinRally: [null,null,null], garrison: [null,null,null] });

  useEffect(() => {
    const handler = snap => {
      const data = snap.val();
      if (data) setGuideImages({ joinRally: data.joinRally || [null,null,null], garrison: data.garrison || [null,null,null] });
    };
    db.ref("guideImages").on("value", handler);
    return () => db.ref("guideImages").off("value", handler);
  }, []);

  function uploadImage(sectionKey, idx, file) {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const SIZE = 220;
        const canvas = document.createElement("canvas");
        canvas.width = SIZE; canvas.height = SIZE;
        const ctx = canvas.getContext("2d");
        const min = Math.min(img.width, img.height);
        ctx.drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, SIZE, SIZE);
        const b64 = canvas.toDataURL("image/jpeg", 0.78);
        setGuideImages(prev => {
          const updated = { ...prev, [sectionKey]: [...(prev[sectionKey] || [null,null,null])] };
          updated[sectionKey][idx] = b64;
          db.ref("guideImages").set(updated);
          return updated;
        });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function removeImage(sectionKey, idx) {
    setGuideImages(prev => {
      const updated = { ...prev, [sectionKey]: [...(prev[sectionKey] || [null,null,null])] };
      updated[sectionKey][idx] = null;
      db.ref("guideImages").set(updated);
      return updated;
    });
  }

  const sections = [
    {
      key: "joinRally",
      title: "Join Rally", subtitle: "1st Hero", color: C.blue,
      heroes: ["Chenko", "Amane", "Yeonwoo"],
      heroColors: ["#c084fc", "#f87171", "#60a5fa"],
      ratio: "50 – 20 – 30", troops: "Infantry  /  Cavalry  /  Archers",
    },
    {
      key: "garrison",
      title: "Garrison Support", subtitle: "1st Hero", color: C.green,
      heroes: ["Gordon"],
      heroColors: ["#fbbf24"],
      ratio: "60 – 20 – 20", troops: "Infantry  /  Cavalry  /  Archers",
    },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Hero cards — always side by side */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
      {sections.map(s => {
        const sImgs = guideImages[s.key] || [null, null, null];
        return (
          <div key={s.title} style={{
            background: "rgba(255,255,255,0.05)",
            backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
            border: `1px solid ${s.color}33`,
            borderRadius: 14, padding: "14px 16px",
            boxShadow: "0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08)",
          }}>
            <div style={{ textAlign: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: s.color, fontFamily: "'Roboto Condensed', sans-serif", letterSpacing: 0.5, textTransform: "uppercase" }}>{s.title}</div>
              <div style={{ fontSize: 10, color: C.textDim, marginTop: 2 }}>{s.subtitle}</div>
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 12 }}>
              {s.heroes.map((h, i) => (
                <HeroSlot
                  key={h}
                  image={sImgs[i]}
                  color={s.heroColors[i]}
                  name={h}
                  onUpload={file => uploadImage(s.key, i, file)}
                  onRemove={() => removeImage(s.key, i)}
                />
              ))}
            </div>
            <div style={{ textAlign: "center", background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: "8px 10px" }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: C.text, fontFamily: "'Bebas Neue', sans-serif", letterSpacing: 2, marginBottom: 3 }}>{s.ratio}</div>
              <div style={{ fontSize: 9, color: C.textDim, letterSpacing: 1 }}>{s.troops}</div>
            </div>
          </div>
        );
      })}
      </div>{/* end hero grid */}

      {/* ── KvK Strategy Guide ── */}
      <div style={{
        background: "rgba(255,255,255,0.04)",
        backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
        border: "1px solid rgba(255,255,255,0.10)",
        borderRadius: 14, padding: "18px 20px",
        boxShadow: "0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06)",
      }}>
        {/* Title */}
        <div style={{ marginBottom: 14, borderBottom: "1px solid rgba(255,255,255,0.08)", paddingBottom: 12 }}>
          <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 20, color: C.accent, letterSpacing: 2, marginBottom: 2 }}>KvK Castle Rally Strategy</div>
          <div style={{ fontSize: 10, color: C.textDim, letterSpacing: 1, textTransform: "uppercase", fontFamily: "'Roboto Condensed',sans-serif" }}>KvK Mechanics</div>
        </div>

        {/* Overall Strategy */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 9, fontWeight: 800, color: C.accent, letterSpacing: 1.5, fontFamily: "'Roboto Condensed',sans-serif", textTransform: "uppercase", marginBottom: 8 }}>Overall Strategy</div>
          {[
            { badge: "MKP", color: C.gold,  label: "Assault Squad",         desc: "Launch 3–4 synchronized rallies to remove the enemy from the castle." },
            { badge: "WFP", color: C.green, label: "Castle Garrison Squad",  desc: "Follow directly behind MKP, take control, and reinforce the castle." },
            { badge: "MKP", color: "#ff8040", label: "Counter-Rally Squad", desc: "Prepare counter-rallies whenever the enemy launches against the castle." },

          <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.6, marginBottom: 8 }}>
            Garrison Squad solo rushes Castle to achieve first castle occupation.
          </div>
          {[
            { color: C.green,   prefix: "If Successful:",   desc: "Assault Squad prepares to launch synchronized counter rally once the opposing Kingdom starts Castle Rally." },
            { color: "#ff8040", prefix: "If Unsuccessful:", desc: "Assault Squad launches synchronized rallies at 12:01:00 UTC. Garrison Squad launches rally at 12:01:15." },
          ].map(b => (
            <div key={b.prefix} style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 6, paddingLeft: 12, borderLeft: `2px solid ${b.color}44` }}>
              <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.5 }}>
                <span style={{ color: b.color, fontWeight: 700 }}>{b.prefix} </span>{b.desc}
              </div>
            </div>
          ))}

        {/* Rally Sequence */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 9, fontWeight: 800, color: C.blue, letterSpacing: 1.5, fontFamily: "'Roboto Condensed',sans-serif", textTransform: "uppercase", marginBottom: 6 }}>Rally Sequence</div>
          <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.6, marginBottom: 8 }}>
            Assault Squad rallies should land in sequence with minimal gaps so the enemy cannot refill between attacks.
          </div>
          {[
            { n: "1", color: "#ff8040", desc: "First rallies weaken the enemy garrison." },
            { n: "2", color: C.gold,    desc: "Final rally clears or captures the castle." },
            { n: "3", color: C.green,   desc: "Garrison Squad arrives immediately afterward." },
          ].map(s => (
            <div key={s.n} style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 6 }}>
              <div style={{ width: 20, height: 20, borderRadius: 6, background: s.color + "22", border: `1px solid ${s.color}55`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 800, color: s.color, flexShrink: 0 }}>{s.n}</div>
              <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.5, paddingTop: 2 }}>{s.desc}</div>
            </div>
          ))}
        </div>

        {/* Garrison Support Squad */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 9, fontWeight: 800, color: C.green, letterSpacing: 1.5, fontFamily: "'Roboto Condensed',sans-serif", textTransform: "uppercase", marginBottom: 6 }}>Garrison Support Squad</div>
          <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.6, marginBottom: 8 }}>
            Garrison Squad should prepare while MKP's rallies are traveling and enter the castle immediately after it is cleared. Once inside:
          </div>
          {[
            "Continuously refill lost troops.",
            "Prioritize strong defensive heroes and infantry.",
            "Rotate damaged marches when instructed.",
            "Increase reinforcement as soon as enemy rallies are launched.",
          ].map(item => (
            <div key={item} style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 5 }}>
              <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.green, flexShrink: 0, marginTop: 5, boxShadow: `0 0 4px ${C.green}` }} />
              <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.5 }}>{item}</div>
            </div>
          ))}
        </div>

        {/* Trigger Events */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 9, fontWeight: 800, color: C.red, letterSpacing: 1.5, fontFamily: "'Roboto Condensed',sans-serif", textTransform: "uppercase", marginBottom: 8 }}>Trigger Events</div>
          {[
            { color: C.red,     event: "Enemy controls castle",    action: "MKP begins synchronized assault rallies." },
            { color: C.green,   event: "Castle is cleared",        action: "WFP sends the hold march immediately." },
            { color: "#ff8040", event: "Enemy launches a rally",   action: "MKP prepares a counter-rally and WFP refills." },
            { color: C.red,     event: "Castle is lost",           action: "Stop solo attacks, reset, and repeat the MKP assault → WFP hold sequence." },
          ].map(t => (
            <div key={t.event} style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 7 }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: t.color, flexShrink: 0, marginTop: 4, boxShadow: `0 0 4px ${t.color}` }} />
              <div style={{ fontSize: 11, lineHeight: 1.5 }}>
                <span style={{ color: t.color, fontWeight: 700 }}>{t.event}: </span>
                <span style={{ color: C.textDim }}>{t.action}</span>
              </div>
            </div>
          ))}
        </div>

        {/* Footer */}
        <div style={{ borderTop: "1px solid rgba(255,255,255,0.08)", paddingTop: 12, textAlign: "center" }}>
          <span style={{ fontSize: 12, fontWeight: 800, color: C.gold, fontFamily: "'Roboto Condensed',sans-serif", letterSpacing: 0.5 }}>MKP clears and counters. </span>
          <span style={{ fontSize: 12, fontWeight: 800, color: C.green, fontFamily: "'Roboto Condensed',sans-serif", letterSpacing: 0.5 }}>WFP captures and holds.</span>
        </div>
      </div>
    </div>
  );
}

// ── Castle Map ─────────────────────────────────────────────────────────────
//
// Layout matches blueprint exactly:
//   • 13×13 uniform grid of assignable tiles
//   • All tiles gray / light — fully assignable (no "enemy zone" tiles baked in)
//   • Red rectangle border drawn around the inner 11×11 area (rows 1–11, cols 1–11)
//   • Castle = white 6×6 zone in center (rows 3–8, cols 3–8), NOT assignable
//   • 4 turret tiles at castle corners labeled North/East/West/South
//     - North: top-left corner of castle (r=3, c=3)
//     - East:  top-right corner (r=3, c=8)
//     - West:  bottom-left corner (r=8, c=3)
//     - South: bottom-right corner (r=8, c=8)
//   • Castle interior (non-turret cells) rendered as white overlay, no tile grid shown

// 14×14 grid. Layout:
//   Row/Col 0        → outer ring (assignable, outside red border)
//   Row/Col 1        → red border line sits on outer edge of this row/col
//   Rows/Cols 2–3    → 3-tile gap between red border and castle  (wait: border at col1 inner edge, gap cols 2,3,4 = 3 tiles... let's be precise)
//
// Precise layout (0-indexed):
//   Col 0            : outer tile (assignable)
//   Col 1            : red border left edge passes between col0 and col1 outer edges
//   Cols 1,2,3       : 3 gap tiles inside red border on left  → castle starts col 4
//   Cols 4–9         : castle (6 wide)
//   Cols 10,11,12    : 3 gap tiles inside red border on right
//   Col 13           : outer tile (assignable)
//   Red border: left edge at col1 left, right edge at col12 right → spans cols 1–12
//   Same logic for rows.
//
// 14 cols total: 0 | 1,2,3(gap) | 4,5,6,7,8,9(castle) | 10,11,12(gap) | 13
// Red border rect encompasses rows 1–12, cols 1–12

const ROWS = 14, COLS = 14;

// Castle occupies rows 4-9, cols 4-9 (inclusive) — 6×6
const CR1 = 4, CR2 = 9, CC1 = 4, CC2 = 9;

// Maps the turret corner label to its Primary Target name
const TURRET_LABEL_TO_TARGET = {
  "North": "Turret (N)",
  "East":  "Turret (E)",
  "South": "Turret (S)",
  "West":  "Turret (W)",
};

const TURRETS = [
  { r: CR1, c: CC1, label: "North" },
  { r: CR1, c: CC2, label: "East" },
  { r: CR2, c: CC1, label: "West" },
  { r: CR2, c: CC2, label: "South" },
];

function isCastle(r, c) { return r >= CR1 && r <= CR2 && c >= CC1 && c <= CC2; }
function isCastleInterior(r, c) { return r > CR1 && r < CR2 && c > CC1 && c < CC2; }
function isCastleWall(r, c) { return isCastle(r, c) && !isTurret(r, c) && !isCastleInterior(r, c); }
function isTurret(r, c) { return TURRETS.some(t => t.r === r && t.c === c); }
function getTurretLabel(r, c) { return TURRETS.find(t => t.r === r && t.c === c)?.label || null; }

function CastleMap({ members, assignments, setAssignments, isMobile }) {
  const TILE = isMobile ? 28 : 50;
  const GAP  = isMobile ? 2  : 3;
  const [modal, setModal] = useState(null);
  const [hover, setHover] = useState(null);
  const [filter, setFilter] = useState("all");

  const key = (r, c) => `${r},${c}`;
  const getA = (r, c) => assignments[key(r, c)];

  function handleClick(r, c) {
    if (isCastle(r, c) && !isTurret(r, c)) return;
    if (isTurret(r, c)) return; // turrets not assignable
    setModal({ r, c, existing: getA(r, c) });
  }

  function assignFriendly(r, c, memberId) {
    const member = members.find(m => m.id === memberId);
    if (!member) return;
    setAssignments(p => ({ ...p, [key(r, c)]: { type: "friendly", member } }));
    setModal(null);
  }
  function assignEnemy(r, c, data) {
    setAssignments(p => ({ ...p, [key(r, c)]: { type: "enemy", ...data } }));
    setModal(null);
  }
  function clearTile(r, c) {
    setAssignments(p => { const n = { ...p }; delete n[key(r, c)]; return n; });
    setModal(null);
  }

  const friendlyCount = Object.values(assignments).filter(a => a.type === "friendly").length;
  const enemyCount = Object.values(assignments).filter(a => a.type === "enemy").length;

  const gridW = COLS * TILE + (COLS - 1) * GAP;
  const gridH = ROWS * TILE + (ROWS - 1) * GAP;

  // Castle overlay — covers the full 6×6 zone (rows CR1–CR2, cols CC1–CC2)
  // Turrets sit on top at zIndex 25; this fills everything else
  const interiorX = CC1 * (TILE + GAP);
  const interiorY = CR1 * (TILE + GAP);
  const interiorW = 6 * TILE + 5 * GAP;
  const interiorH = 6 * TILE + 5 * GAP;

  // Red border: encompasses rows 1–12, cols 1–12 (3 gap tiles each side around 6×6 castle)
  const bx = 1 * (TILE + GAP) - 1;
  const by = 1 * (TILE + GAP) - 1;
  const bw = 12 * TILE + 11 * GAP + 2;
  const bh = 12 * TILE + 11 * GAP + 2;

  // Gold castle outline: rows CR1–CR2, cols CC1–CC2
  const cx = CC1 * (TILE + GAP) - 1;
  const cy = CR1 * (TILE + GAP) - 1;
  const cw = 6 * TILE + 5 * GAP + 2;
  const ch = 6 * TILE + 5 * GAP + 2;

  // ── Sidebar derived data ──────────────────────────────────────────────────
  const friendlyByAlliance = {};
  Object.values(assignments).filter(a => a.type === "friendly").forEach(a => {
    const al = a.member.alliance;
    friendlyByAlliance[al] = (friendlyByAlliance[al] || 0) + 1;
  });
  const targetCounts = {};
  members.forEach(m => { targetCounts[m.primaryTarget] = (targetCounts[m.primaryTarget] || 0) + 1; });
  const assignedMemberIds = new Set(Object.values(assignments).filter(a => a.type === "friendly").map(a => a.member.id));
  const unassignedMembers = members.filter(m => !assignedMemberIds.has(m.id));
  const availColorMap = { Full: C.green, "1st Half": C.blue, "2nd Half": C.gold, "On/Off": C.red };
  const targetColorMap = { Castle: C.accent, "Turret (N)": "#20d0d0", "Turret (E)": "#c060ff", "Turret (S)": "#ff8040", "Turret (W)": "#40c080" };

  const SideSection = ({ title, children, accent }) => (
    <div style={{
      background: "rgba(255,255,255,0.05)",
      backdropFilter: "blur(20px)",
      WebkitBackdropFilter: "blur(20px)",
      border: "1px solid rgba(255,255,255,0.10)",
      borderRadius: 14,
      padding: "14px 16px",
      boxShadow: "0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08)",
    }}>
      <div style={{ fontSize: 10, color: accent || C.accent, letterSpacing: 2, marginBottom: 10, fontFamily: "'Roboto Condensed', sans-serif", fontWeight: 700, textTransform: "uppercase" }}>{title}</div>
      {children}
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", gap: 16, alignItems: "flex-start" }}>

      {/* ── LEFT: Map ── */}
      <div style={{ flex: "0 0 auto", width: isMobile ? "100%" : "auto", overflowX: isMobile ? "auto" : "visible" }}>
        {/* Filters */}
        <div style={{ display: "flex", gap: 5, marginBottom: 10, alignItems: "center", flexWrap: "wrap" }}>
          {[["all","All"],["friendly","🤝 Friendly"],["enemy","⚔ Enemy"],["unassigned","○ Unassigned"]].map(([v, label]) => (
            <button key={v} onClick={() => setFilter(v)} style={{
              ...btnSt, fontSize: 11, padding: "5px 12px",
              background: filter === v ? "rgba(167,139,250,0.2)" : "rgba(255,255,255,0.05)",
              color: filter === v ? C.accent : C.textDim,
              border: filter === v ? `1px solid ${C.accent}66` : "1px solid rgba(255,255,255,0.08)",
              borderRadius: 20,
            }}>{label}</button>
          ))}
          <div style={{ flex: 1 }} />
          <button onClick={() => setAssignments({})} style={{ ...btnSt, fontSize: 11, padding: "5px 12px", background: "rgba(248,113,113,0.15)", color: C.red, border: `1px solid ${C.red}44`, borderRadius: 20 }}>↺ Reset</button>
        </div>

        {/* Grid */}
        <div style={{ position: "relative", width: gridW, height: gridH, flexShrink: 0 }}>
          {Array.from({ length: ROWS }, (_, r) =>
            Array.from({ length: COLS }, (_, c) => {
              const castle = isCastle(r, c);
              const turret = isTurret(r, c);
              const wall = !turret && isCastleWall(r, c);
              const assignment = getA(r, c);
              const x = c * (TILE + GAP);
              const y = r * (TILE + GAP);
              const tLabel = getTurretLabel(r, c);
              const isSelected = modal?.r === r && modal?.c === c;
              // Skip interior AND wall tiles (only turrets render individually)
              if (castle && !turret) return null;
              let dimmed = false;
              if (filter === "friendly" && assignment?.type !== "friendly") dimmed = true;
              if (filter === "enemy" && assignment?.type !== "enemy") dimmed = true;
              if (filter === "unassigned" && assignment) dimmed = true;
              let bg, border;
              const isLeader = assignment?.type === "friendly" && assignment.member.role === "Rally Leader";
              const leaderTarget = isLeader ? (assignment.member.primaryTarget || "Castle") : null;
              const leaderStyle = leaderTarget ? (LEADER_STYLES[leaderTarget] || LEADER_STYLES["Castle"]) : null;
              if (dimmed) { bg = "rgba(255,255,255,0.03)"; border = "1px solid rgba(255,255,255,0.05)"; }
              else if (turret) {
                const ts = LEADER_STYLES[TURRET_LABEL_TO_TARGET[tLabel]] || LEADER_STYLES["Castle"];
                bg = ts.bg; border = `1.5px solid ${ts.border}`;
              }
              else if (isLeader) { bg = leaderStyle.bg; border = `1.5px solid ${leaderStyle.border}`; }
              else if (assignment?.type === "friendly") { bg = "linear-gradient(135deg,#0d2e52,#0a3d6e)"; border = `1.5px solid ${C.blue}`; }
              else if (assignment?.type === "enemy") { bg = "linear-gradient(135deg,#3a0d0d,#520a0a)"; border = `1.5px solid ${C.red}`; }
              else { bg = "rgba(180,192,205,0.55)"; border = "1px solid rgba(160,175,190,0.5)"; }
              if (isSelected) border = `2px solid ${C.accent}`;
              return (
                <div key={`${r},${c}`}
                  onClick={() => !turret && handleClick(r, c)}
                  onMouseEnter={e => {
                    if (assignment && !turret) setHover({ r, c, a: assignment, x: e.clientX, y: e.clientY });
                    if (!turret && !dimmed && !isSelected) { e.currentTarget.style.filter = "brightness(1.15)"; e.currentTarget.style.boxShadow = `0 0 0 1.5px ${C.accent}88`; }
                  }}
                  onMouseLeave={e => {
                    setHover(null);
                    e.currentTarget.style.filter = ""; e.currentTarget.style.boxShadow = "";
                  }}
                  style={{
                    position: "absolute", left: x, top: y, width: TILE, height: TILE,
                    background: bg, border, borderRadius: 4,
                    cursor: turret ? "default" : "pointer",
                    display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                    overflow: "hidden", boxSizing: "border-box", zIndex: turret ? 25 : 1,
                    transition: "filter 0.1s, box-shadow 0.1s",
                  }}>
                  {turret && (() => {
                    const ts = LEADER_STYLES[TURRET_LABEL_TO_TARGET[tLabel]] || LEADER_STYLES["Castle"];
                    return <span style={{ fontSize: 9, fontWeight: 800, color: ts.border, textAlign: "center", lineHeight: 1.2, fontFamily: "'Roboto Condensed','Arial Narrow',sans-serif", letterSpacing: 0.5, textTransform: "uppercase", textShadow: `0 0 6px ${ts.border}88` }}>{tLabel}</span>;
                  })()}
                  {!turret && !dimmed && assignment?.type === "friendly" && (() => {
                    const full = assignment.member.name;
                    const display = full.length > 10 ? full.slice(0, 10) + "…" : full;
                    const len = display.length;
                    const fs = isMobile ? (len <= 5 ? 8 : 7) : (len <= 4 ? 12 : len <= 6 ? 11 : len <= 8 ? 10 : 9);
                    const target = assignment.member.primaryTarget || "";
                    const targetCol = TARGET_COLORS[target] || C.textDim;
                    const iconSize = isMobile ? 8 : 14;
                    const turretSize = isMobile ? 9 : 16;
                    const targetIconFn = target === "Castle"
                      ? (col) => <CrownIcon color={col} size={iconSize} />
                      : target.startsWith("Turret")
                        ? (col) => <TurretIcon color={col} letter={target.slice(8,9)} size={turretSize} />
                        : null;
                    const ls = isLeader ? (LEADER_STYLES[target] || LEADER_STYLES["Castle"]) : null;
                    const pillBg = isLeader ? ls.pill : "rgba(160,210,255,0.95)";
                    const pillText = isLeader ? ls.text : "#071830";
                    return (
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, width: "100%", padding: "2px 2px" }}>
                        <span style={{
                          fontSize: fs, fontWeight: 700, lineHeight: 1,
                          color: pillText,
                          background: pillBg,
                          borderRadius: 3, padding: "2px 3px",
                          fontFamily: "'Roboto Condensed','Arial Narrow',sans-serif",
                          letterSpacing: 0,
                          maxWidth: TILE - 2,
                          overflow: "hidden", whiteSpace: "nowrap",
                          display: "block", textAlign: "center",
                          boxShadow: "0 1px 3px rgba(0,0,0,0.25)",
                        }}>{display}</span>
                        {isLeader && targetIconFn && (
                          <div style={{ filter: `drop-shadow(0 0 2px ${targetCol}99)`, lineHeight: 0 }}>
                            {targetIconFn(targetCol)}
                          </div>
                        )}
                      </div>
                    );
                  })()}
                  {!turret && !dimmed && assignment?.type === "enemy" && null}
                </div>
              );
            })
          )}

          {/* Castle interior — fills full 6×6 zone; turrets (zIndex 25) sit on top */}
          <div style={{
            position: "absolute", left: interiorX, top: interiorY, width: interiorW, height: interiorH,
            background: LEADER_STYLES["Castle"].bg,
            display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 10, pointerEvents: "none",
            boxShadow: `inset 0 0 24px rgba(0,0,0,0.4), 0 0 12px ${LEADER_STYLES["Castle"].border}44`,
          }}>
            <span style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: isMobile ? 16 : 28, fontWeight: 900, color: LEADER_STYLES["Castle"].border, letterSpacing: 4, textShadow: `0 0 16px ${LEADER_STYLES["Castle"].border}88` }}>CASTLE</span>
          </div>

          {/* SVG borders */}
          <svg style={{ position: "absolute", left: 0, top: 0, width: gridW, height: gridH, pointerEvents: "none", zIndex: 30 }}>
            <defs>
              <filter id="castleGlow">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            {/* Castle zone border — thick gold with glow */}
            <rect x={cx} y={cy} width={cw} height={ch} fill="none"
              stroke={LEADER_STYLES["Castle"].border} strokeWidth={3}
              filter="url(#castleGlow)" />
            {/* Battlefield red border */}
            <rect x={bx} y={by} width={bw} height={bh} fill="none" stroke={C.red} strokeWidth={2} rx={1} />
          </svg>
        </div>

        {/* Legend */}
        <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
          {[
            { bg: "rgba(180,192,205,0.55)", border: "rgba(160,175,190,0.5)", label: "Empty" },
            ...Object.entries(LEADER_STYLES).filter(([k]) => k !== "None").map(([k, s]) => ({
              bg: s.bg, border: s.border,
              label: k === "Castle" ? "Leader·🏰" : `Leader·${k.slice(8,9)}`
            })),
            { bg: "linear-gradient(135deg,#0d2e52,#0a3d6e)", border: C.blue,   label: "Joiner" },
            { bg: "linear-gradient(135deg,#3a0d0d,#520a0a)", border: C.red,    label: "Enemy" },
          ].map(({ bg, border, label }) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: C.textDim }}>
              <div style={{ width: 11, height: 11, background: bg, border: `1.5px solid ${border}`, borderRadius: 3, flexShrink: 0 }} />
              {label}
            </div>
          ))}
        </div>
      </div>

      {/* ── RIGHT: Sidebar ── */}
      <div style={{ flex: 1, minWidth: isMobile ? "100%" : 200, display: "flex", flexDirection: "column", gap: 8, maxHeight: isMobile ? "none" : gridH + 50, overflowY: isMobile ? "visible" : "auto" }}>

        {/* Tile assignment panel — shown when a tile is selected */}
        {modal && (
          <TilePanel modal={modal} members={members} assignments={assignments}
            onFriendly={assignFriendly} onEnemy={assignEnemy} onClear={clearTile} onClose={() => setModal(null)} isMobile={isMobile} />
        )}

        {/* Unpositioned members — desktop only */}
        {!isMobile && (
          <SideSection title={`UNPOSITIONED (${unassignedMembers.length})`}>
            {unassignedMembers.length === 0 ? (
              <div style={{ fontSize: 10, color: C.green, textAlign: "center", padding: "6px 0" }}>✓ All members positioned</div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {unassignedMembers.map(m => (
                  <div key={m.id} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 6, padding: "5px 8px", border: "1px solid rgba(255,255,255,0.07)", display: "flex", alignItems: "center", gap: 5 }}>
                    <div style={{ width: 5, height: 5, borderRadius: "50%", background: availColorMap[m.available] || C.textDim, flexShrink: 0, boxShadow: `0 0 4px ${availColorMap[m.available] || C.textDim}` }} />
                    <span style={{ fontSize: 10, fontWeight: 700, color: C.text, flex: 1 }}>{m.name}</span>
                    <span style={{ fontSize: 9, color: C.textDim }}>{m.tc}</span>
                    <span style={{ fontSize: 9, color: allianceColor(m.alliance), fontWeight: 700 }}>{m.alliance}</span>
                  </div>
                ))}
              </div>
            )}
          </SideSection>
        )}

        {/* Full member roster with availability */}
        <SideSection title="MEMBER ROSTER">
          <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
            {members.map(m => {
              const isOnMap = assignedMemberIds.has(m.id);
              return (
                <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 5, padding: "5px 8px", borderRadius: 6, background: isOnMap ? "rgba(96,165,250,0.12)" : "rgba(255,255,255,0.03)", border: `1px solid ${isOnMap ? C.blue + "44" : "rgba(255,255,255,0.06)"}`, transition: "all 0.15s" }}>
                  <div style={{ width: 5, height: 5, borderRadius: "50%", background: availColorMap[m.available] || C.textDim, flexShrink: 0 }} />
                  <span style={{ fontSize: 10, fontWeight: 700, color: isOnMap ? "#90c8ff" : C.text, flex: 1 }}>{m.name}</span>
                  <span style={{ fontSize: 9, color: C.textDim }}>{m.tc}</span>
                  <span style={{ fontSize: 9, color: allianceColor(m.alliance), fontWeight: 700 }}>{m.alliance}</span>
                  {isOnMap && <span style={{ fontSize: 8, color: C.blue }}>●</span>}
                </div>
              );
            })}
          </div>
        </SideSection>
      </div>

      {/* Hover tooltip */}
      {hover && (
        <div style={{
          position: "fixed", top: hover.y - 8, left: hover.x + 14,
          background: "#0d1520f2", border: `1px solid ${C.panelBorder}`,
          borderRadius: 7, padding: "10px 14px", zIndex: 9999, fontSize: 12, color: C.text,
          maxWidth: 220, pointerEvents: "none", boxShadow: "0 4px 20px #000a",
        }}>
          {hover.a.type === "friendly" ? (
            <>
              <div style={{ fontWeight: 800, color: hover.a.member.role === "Rally Leader" ? C.gold : C.blue, marginBottom: 5 }}>{hover.a.member.name}</div>
              <div style={{ color: C.textDim, marginBottom: 2 }}>Role: <span style={{ color: C.text }}>{hover.a.member.role}</span></div>
              <div style={{ color: C.textDim }}>Alliance: <span style={{ color: allianceColor(hover.a.member.alliance) }}>{hover.a.member.alliance || "—"}</span></div>
            </>
          ) : (
            <>
              <div style={{ fontWeight: 800, color: C.red, marginBottom: 5 }}>{hover.a.name || "Enemy"}</div>
              {hover.a.kingdom && <div style={{ color: C.textDim, marginBottom: 2 }}>Kingdom: <span style={{ color: C.text }}>{hover.a.kingdom}</span></div>}
              <div style={{ color: C.textDim, marginBottom: 2 }}>Threat: <span style={{ color: C.red }}>{hover.a.threat}</span></div>
              {hover.a.notes && <div style={{ color: C.textDim, marginTop: 4, fontStyle: "italic" }}>{hover.a.notes}</div>}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [loading, setLoading]       = useState(true);
  const [editMode, setEditMode]     = useState(false);
  const [showAuth, setShowAuth]     = useState(false);
  const [authInput, setAuthInput]   = useState("");
  const [authError, setAuthError]   = useState(false);
  const [members, setMembers]       = useState([]);
  const [assignments, setAssignments] = useState({});
  const [alliances, setAlliances]   = useState(DEFAULT_ALLIANCES);
  const [teams, setTeams]           = useState(DEFAULT_TEAMS);
  const [tab, setTab]               = useState("dashboard");
  const [filterRole, setFilterRole] = useState("all");
  const [filterAlliance, setFilterAlliance] = useState("");
  const [filterAvail, setFilterAvail] = useState("all");
  const [sortKey, setSortKey]       = useState("name");
  const [sortDir, setSortDir]       = useState(1);
  const [search, setSearch]         = useState("");
  const [windowWidth, setWindowWidth] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
  const isMobile = windowWidth < 768;

  useEffect(() => {
    const handler = () => setWindowWidth(window.innerWidth);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);

  // Keep module-level color maps in sync
  _allianceColorMap = Object.fromEntries(alliances.map(a => [a.name, a.color]));
  _teamColorMap = Object.fromEntries(teams.map(t => [t.name, t.color]));

  // ── Firebase listeners ─────────────────────────────────────────────────
  useEffect(() => {
    const membersHandler = snap => {
      const data = snap.val();
      if (data) { setMembers(Object.values(data)); }
      else { const seed = {}; initMembers.forEach(m => { seed[m.id] = m; }); db.ref("members").set(seed); }
      setLoading(false);
    };
    db.ref("members").on("value", membersHandler, err => { console.error("Firebase error:", err); setLoading(false); });

    const assignmentsHandler = snap => {
      const data = snap.val() || {};
      const converted = {};
      Object.entries(data).forEach(([k, v]) => { converted[fromFbKey(k)] = v; });
      setAssignments(converted);
    };
    db.ref("assignments").on("value", assignmentsHandler);

    const alliancesHandler = snap => {
      const data = snap.val();
      if (data) setAlliances(Array.isArray(data) ? data : Object.values(data));
    };
    db.ref("alliances").on("value", alliancesHandler);

    const teamsHandler = snap => {
      const data = snap.val();
      if (data) setTeams(Array.isArray(data) ? data : Object.values(data));
    };
    db.ref("teams").on("value", teamsHandler);

    return () => {
      db.ref("members").off("value", membersHandler);
      db.ref("assignments").off("value", assignmentsHandler);
      db.ref("alliances").off("value", alliancesHandler);
      db.ref("teams").off("value", teamsHandler);
    };
  }, []);

  // ── Member writes ──────────────────────────────────────────────────────
  function tryAuth() {
    if (authInput.toLowerCase() === "hammad") {
      setEditMode(true); setShowAuth(false); setAuthInput(""); setAuthError(false);
    } else { setAuthError(true); setAuthInput(""); }
  }
  function requireEdit() { if (!editMode) { setShowAuth(true); return false; } return true; }

  function addMember(m) {
    if (!requireEdit()) return;
    db.ref(`members/${m.id}`).set(m);
  }
  function updateMember(id, field, value) {
    if (!requireEdit()) return;
    db.ref(`members/${id}`).update({ [field]: value });
    const affected = Object.keys(assignments).filter(
      k => assignments[k]?.type === "friendly" && assignments[k]?.member?.id === id
    );
    if (affected.length) {
      const tileUpdates = {};
      affected.forEach(k => { tileUpdates[`assignments/${toFbKey(k)}/member/${field}`] = value; });
      db.ref().update(tileUpdates);
    }
  }
  function deleteMember(id) {
    if (!requireEdit()) return;
    db.ref(`members/${id}`).remove();
    const updates = {};
    Object.keys(assignments).forEach(k => {
      if (assignments[k].type === "friendly" && assignments[k].member.id === id)
        updates[`assignments/${toFbKey(k)}`] = null;
    });
    if (Object.keys(updates).length) db.ref().update(updates);
  }
  function importMembers(newOnes) {
    if (!requireEdit()) return;
    const updates = {};
    newOnes.forEach(m => { updates[`members/${m.id}`] = m; });
    db.ref().update(updates);
    const known = new Set(alliances.map(a => a.name));
    const additions = [];
    newOnes.forEach(m => {
      if (m.alliance && !known.has(m.alliance)) { additions.push({ name: m.alliance, color: randomAllianceColor() }); known.add(m.alliance); }
    });
    if (additions.length) db.ref("alliances").set([...alliances, ...additions]);
  }

  function fbSetAssignments(updaterOrValue) {
    if (!requireEdit()) return;
    setAssignments(prev => {
      const next = typeof updaterOrValue === "function" ? updaterOrValue(prev) : updaterOrValue;
      const fbObj = {};
      Object.keys(prev).forEach(k => { fbObj[toFbKey(k)] = null; });
      Object.entries(next).forEach(([k, v]) => { fbObj[toFbKey(k)] = v; });
      if (Object.keys(fbObj).length) db.ref("assignments").update(fbObj);
      return next;
    });
  }

  function addAlliance(name, color) {
    if (!requireEdit()) return;
    if (alliances.some(a => a.name.toLowerCase() === name.toLowerCase())) return;
    db.ref("alliances").set([...alliances, { name, color }]);
  }
  function removeAlliance(name) {
    if (!requireEdit()) return;
    db.ref("alliances").set(alliances.filter(a => a.name !== name));
    members.forEach(m => { if (m.alliance === name) db.ref(`members/${m.id}`).update({ alliance: "" }); });
  }
  function updateAllianceColor(name, color) {
    if (!requireEdit()) return;
    db.ref("alliances").set(alliances.map(a => a.name === name ? { ...a, color } : a));
  }
  function addTeam(name, color) {
    if (!requireEdit()) return;
    if (teams.some(t => t.name.toLowerCase() === name.toLowerCase())) return;
    db.ref("teams").set([...teams, { name, color }]);
  }
  function removeTeam(name) {
    if (!requireEdit()) return;
    db.ref("teams").set(teams.filter(t => t.name !== name));
    members.forEach(m => { if (m.team === name) db.ref(`members/${m.id}`).update({ team: "" }); });
  }
  function updateTeamColor(name, color) {
    if (!requireEdit()) return;
    db.ref("teams").set(teams.map(t => t.name === name ? { ...t, color } : t));
  }

  // ── Derived stats ──────────────────────────────────────────────────────
  const avail        = members.filter(m => m.available === "Full").length;
  const leaders      = members.filter(m => m.role === "Rally Leader").length;
  const joiners      = members.filter(m => m.role === "Rally Joiner").length;
  const friendlyAsgn = Object.values(assignments).filter(a => a.type === "friendly").length;
  const enemyAsgn    = Object.values(assignments).filter(a => a.type === "enemy").length;
  const allianceDist = [...new Set(members.map(m => m.alliance).filter(Boolean))].map(a => ({ label: a, value: members.filter(m => m.alliance === a).length })).sort((a, b) => b.value - a.value);
  const availDist    = AVAILABILITY_OPTS.map(o => ({ label: o, value: members.filter(m => m.available === o).length }));
  const targetDist   = PRIMARY_TARGETS.map(t => ({ label: t, value: members.filter(m => m.primaryTarget === t).length }));

  let filtered = members.filter(m => {
    if (filterRole !== "all" && m.role !== filterRole) return false;
    if (filterAlliance && !(m.alliance || "").toLowerCase().includes(filterAlliance.toLowerCase())) return false;
    if (filterAvail !== "all" && m.available !== filterAvail) return false;
    if (search && !m.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }).sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === "string") av = av.toLowerCase();
    if (typeof bv === "string") bv = bv.toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  function toggleSort(k) { if (sortKey === k) setSortDir(d => -d); else { setSortKey(k); setSortDir(1); } }
  const thSt = { padding: "10px 10px", fontSize: 10, color: C.textDim, textAlign: "left", borderBottom: `1px solid ${C.panelBorder}`, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.8, userSelect: "none", whiteSpace: "nowrap" };

  // ── Loading screen ─────────────────────────────────────────────────────
  if (loading) return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, fontFamily: "'Bebas Neue', sans-serif" }}>
      <div style={{ fontSize: 36, color: C.accent, letterSpacing: 4 }}>⚔ KINGSHOT KvK</div>
      <div style={{ fontSize: 14, color: C.textDim, letterSpacing: 2 }}>CONNECTING TO DATABASE…</div>
      <div style={{ width: 180, height: 3, background: "rgba(255,255,255,0.08)", borderRadius: 99, overflow: "hidden" }}>
        <div style={{ height: "100%", background: C.accent, borderRadius: 99, animation: "loading 1.4s ease-in-out infinite", width: "40%" }} />
      </div>
      <style>{`@keyframes loading { 0%{margin-left:-40%} 100%{margin-left:100%} } @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');`}</style>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Syne','Segoe UI',sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=Roboto+Condensed:wght@400;700&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #080c14; }
        ::-webkit-scrollbar-thumb { background: #1a2a3a; border-radius: 3px; }
        select option { background: #0d1520; }
        .cell-edit { background: transparent; border: 1px solid transparent; border-radius: 6px; color: inherit; padding: 4px 6px; font-size: 12px; width: 100%; box-sizing: border-box; outline: none; transition: background 0.15s, border-color 0.15s; font-family: inherit; }
        .cell-edit:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
        .cell-edit:focus { background: rgba(255,255,255,0.09); border-color: rgba(167,139,250,0.55); }
        select.cell-edit { cursor: pointer; }
        select.cell-edit option { color: #e2e8f3; background: #0d1520; font-weight: 400; }
        .cell-edit::placeholder { color: rgba(255,255,255,0.3); }
      `}</style>

      {/* Passphrase modal */}
      {showAuth && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={e => { if (e.target === e.currentTarget) { setShowAuth(false); setAuthInput(""); setAuthError(false); } }}>
          <div style={{ background: "#0d1520", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 16, padding: 28, width: 300, boxShadow: "0 20px 60px rgba(0,0,0,0.6)" }}>
            <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: C.accent, letterSpacing: 2, marginBottom: 6 }}>EDIT MODE</div>
            <div style={{ fontSize: 12, color: C.textDim, marginBottom: 16 }}>Enter the passphrase to enable editing</div>
            <input type="password" autoFocus
              style={{ ...inputSt, marginBottom: authError ? 6 : 14, fontSize: 14 }}
              value={authInput} placeholder="Passphrase..."
              onChange={e => { setAuthInput(e.target.value); setAuthError(false); }}
              onKeyDown={e => e.key === "Enter" && tryAuth()} />
            {authError && <div style={{ fontSize: 11, color: C.red, marginBottom: 10 }}>✕ Incorrect passphrase</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={tryAuth} style={{ ...btnSt, background: C.accentDim, color: C.accent, flex: 1, padding: "9px 0", fontWeight: 800, fontSize: 13 }}>Unlock</button>
              <button onClick={() => { setShowAuth(false); setAuthInput(""); setAuthError(false); }} style={{ ...btnSt, padding: "9px 16px" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{ background: "linear-gradient(90deg,#0d1520,#101c2c 50%,#0d1520)", borderBottom: `1px solid ${C.panelBorder}`, padding: isMobile ? "0 12px" : "0 24px", display: "flex", alignItems: "center", gap: isMobile ? 8 : 20, height: isMobile ? 50 : 56 }}>
        <div style={{ fontFamily: "'Bebas Neue'", fontSize: isMobile ? 18 : 26, color: C.accent, letterSpacing: 2 }}>⚔ KINGSHOT KvK</div>
        {!isMobile && <div style={{ fontSize: 11, color: C.textDim, borderLeft: `1px solid ${C.panelBorder}`, paddingLeft: 16 }}>ALLIANCE COMMAND CENTER</div>}
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: C.green }}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.green, boxShadow: `0 0 6px ${C.green}` }} />
          {!isMobile && "LIVE"}
        </div>
        {/* Lock / Unlock button */}
        <button onClick={() => editMode ? setEditMode(false) : setShowAuth(true)} style={{
          ...btnSt, padding: "5px 12px", fontSize: 11, fontWeight: 700,
          fontFamily: "'Roboto Condensed','Arial Narrow',sans-serif", letterSpacing: 0.5,
          background: editMode ? "rgba(52,211,153,0.15)" : "rgba(255,255,255,0.06)",
          color: editMode ? C.green : C.textDim,
          border: editMode ? `1px solid ${C.green}44` : "1px solid rgba(255,255,255,0.10)",
        }}>
          {editMode ? "🔓 EDITING" : "🔒 VIEW ONLY"}
        </button>
        {[["dashboard", isMobile ? "📊" : "📊 Dashboard"], ["members", isMobile ? "👥" : "👥 Members"], ["map", isMobile ? "🗺" : "🗺 Battle Map"]].map(([k, label]) => (
          <button key={k} onClick={() => setTab(k)} style={{ ...btnSt, padding: isMobile ? "6px 10px" : "6px 18px", fontSize: isMobile ? 18 : 13, fontWeight: 700, fontFamily: "'Roboto Condensed','Arial Narrow',sans-serif", letterSpacing: 0.5, background: tab === k ? C.accentDim : "transparent", color: tab === k ? C.accent : C.textDim, border: tab === k ? `1px solid ${C.accent}44` : "1px solid transparent" }}>{label}</button>
        ))}
      </div>

      <div style={{ padding: isMobile ? 12 : 20, maxWidth: 1600, margin: "0 auto" }}>

        {/* ── Dashboard ── */}
        {tab === "dashboard" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "repeat(8, 1fr)", gap: 12, marginBottom: 20 }}>
              <StatCard label="Total Members" value={members.length} sub={`${avail} full availability`} />
              <StatCard label="Full Avail." value={avail} sub={`${Math.round(avail / (members.length || 1) * 100)}% ready`} color={C.green} />
              <StatCard label="Rally Leaders" value={leaders} color={C.gold} />
              <StatCard label="Rally Joiners" value={joiners} color={C.blue} />
              <StatCard label="Friendly Tiles" value={friendlyAsgn} sub="on map" color={C.blue} />
              <StatCard label="Enemy Tiles" value={enemyAsgn} sub="tracked" color={C.red} />
              <StatCard label="Off-Map" value={members.length - friendlyAsgn} sub="unpositioned" color={C.textDim} />
              <StatCard label="Coverage" value={`${Math.round(friendlyAsgn / 180 * 100)}%`} sub={`${friendlyAsgn} / 180 tiles`} color={C.accent} />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill,minmax(260px,1fr))", gap: 16, marginBottom: 20 }}>
              {[
                { title: "AVAILABILITY", content: <>
                  {availDist.map(({ label, value }) => {
                    const col = { Full: C.green, "1st Half": C.blue, "2nd Half": C.gold, "On/Off": C.red }[label] || C.textDim;
                    return <MiniBar key={label} label={label} value={value} max={members.length} color={col} />;
                  })}
                </> },
                { title: "ROLES", content: <><DonutSlice label="Rally Leaders" value={leaders} total={members.length} color={C.gold} /><DonutSlice label="Rally Joiners" value={joiners} total={members.length} color={C.blue} /></> },
                { title: "ALLIANCES", content: allianceDist.length ? allianceDist.map(({ label, value }) => <MiniBar key={label} label={label} value={value} max={members.length} color={allianceColor(label)} />) : <div style={{ fontSize: 11, color: C.textDim }}>No alliances set yet</div> },
                { title: "PRIMARY TARGETS", content: targetDist.map(({ label, value }) => {
                  const col = { Castle: C.accent, "Turret (N)": "#20d0d0", "Turret (E)": "#c060ff", "Turret (S)": "#ff8040", "Turret (W)": "#40c080" }[label] || C.textDim;
                  return <MiniBar key={label} label={label} value={value} max={members.length} color={col} />;
                }) },
                { title: "MAP OCCUPANCY", content: <><DonutSlice label="Friendly" value={friendlyAsgn} total={friendlyAsgn + enemyAsgn + 1} color={C.blue} /><DonutSlice label="Enemy" value={enemyAsgn} total={friendlyAsgn + enemyAsgn + 1} color={C.red} /></> },
                { title: "TC LEVELS", content: TC_LEVELS.slice().reverse().map(tg => { const cnt = members.filter(m => m.tc === tg).length; return cnt > 0 ? <MiniBar key={tg} label={tg} value={cnt} max={members.length} color={C.accent} /> : null; }) },
              ].map(({ title, content }) => (
                <div key={title} style={{ background: C.panel, border: `1px solid ${C.panelBorder}`, borderRadius: 10, padding: 18 }}>
                  <div style={{ fontFamily: "'Bebas Neue'", fontSize: 15, color: C.accent, letterSpacing: 1, marginBottom: 12 }}>{title}</div>
                  {content}
                </div>
              ))}
            </div>
            <div style={{ background: C.panel, border: `1px solid ${C.panelBorder}`, borderRadius: 10, padding: 18 }}>
              <div style={{ fontFamily: "'Bebas Neue'", fontSize: 15, color: C.accent, letterSpacing: 1, marginBottom: 12 }}>QUICK ROSTER</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {members.map(m => (
                  <div key={m.id} style={{ background: m.available === "Full" ? "#0a2a1a" : "#2a0a0a", border: `1px solid ${m.available === "Full" ? C.green : C.red}33`, borderRadius: 6, padding: "6px 12px", fontSize: 12 }}>
                    <span style={{ fontWeight: 700 }}>{m.name}</span>
                    <span style={{ color: C.textDim, marginLeft: 6, fontSize: 11 }}>{m.tc}</span>
                    <span style={{ marginLeft: 6 }}><Pill color={allianceColor(m.alliance)}>{m.alliance || "—"}</Pill></span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── Members ── */}
        {tab === "members" && (
          <div>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 16, flexWrap: "wrap" }}>
              <AddMemberButton onAdd={addMember} alliances={alliances} />
              <CsvUploadButton onImport={importMembers} />
              <AllianceManager alliances={alliances} onAdd={addAlliance} onRemove={removeAlliance} onColorChange={updateAllianceColor} />
              <TeamManager teams={teams} onAdd={addTeam} onRemove={removeTeam} onColorChange={updateTeamColor} />
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
              <input style={{ ...inputSt, flex: "1 1 140px", minWidth: 0 }} placeholder="🔍 Search name…" value={search} onChange={e => setSearch(e.target.value)} />
              {!isMobile && <>
                <select style={{ ...inputSt, width: 150 }} value={filterRole} onChange={e => setFilterRole(e.target.value)}>
                  <option value="all">All Roles</option>{ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
                <input style={{ ...inputSt, width: 150 }} placeholder="Filter alliance…" value={filterAlliance} onChange={e => setFilterAlliance(e.target.value)} />
                <select style={{ ...inputSt, width: 160 }} value={filterAvail} onChange={e => setFilterAvail(e.target.value)}>
                  <option value="all">All Availability</option>
                  {AVAILABILITY_OPTS.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              </>}
              {isMobile && <>
                <select style={{ ...inputSt, flex: "1 1 100px" }} value={filterAvail} onChange={e => setFilterAvail(e.target.value)}>
                  <option value="all">All Avail.</option>
                  {AVAILABILITY_OPTS.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              </>}
              <span style={{ fontSize: 12, color: C.textDim }}>{filtered.length}/{members.length}</span>
            </div>
            {isMobile ? (
              <div>
                {filtered.length === 0 && <div style={{ textAlign: "center", color: C.textDim, padding: 40 }}>No members match filters</div>}
                {filtered.map(m => (
                  <MemberCard key={m.id} m={m} alliances={alliances} teams={teams} onUpdate={updateMember} onDelete={deleteMember} />
                ))}
              </div>
            ) : (
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", background: C.panel, borderRadius: 10, overflow: "hidden" }}>
                <thead>
                  <tr style={{ background: "#0a1820" }}>
                    {[["name","Name"],["tc","TC"],["available","Avail."],["role","Role"],["alliance","Alliance"],["team","Team"],["primaryTarget","Primary Target"],["notes","Notes"],[null,"Actions"]].map(([k, label]) => (
                      <th key={label} style={thSt} onClick={() => k && toggleSort(k)}>{label}{k && sortKey === k ? (sortDir === 1 ? " ↑" : " ↓") : ""}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(m => (
                    <MemberRow key={m.id} m={m} alliances={alliances} teams={teams} onUpdate={updateMember} onDelete={deleteMember} />
                  ))}
                  {!filtered.length && <tr><td colSpan={9} style={{ padding: 40, textAlign: "center", color: C.textDim }}>No members match filters</td></tr>}
                </tbody>
              </table>
            </div>
            )}
          </div>
        )}

        {/* ── Map ── */}
        {tab === "map" && (
          <div>
            <div style={{ marginBottom: isMobile ? 10 : 16 }}>
              <div style={{ fontFamily: "'Bebas Neue'", fontSize: isMobile ? 20 : 24, color: C.accent, letterSpacing: 3, marginBottom: 4 }}>KVK BATTLE MAP</div>
              {!isMobile && <div style={{ fontSize: 12, color: C.textDim }}>Click any gray tile to assign a member or mark an enemy. Changes sync live to all users.</div>}
            </div>

            <div style={{
              background: "rgba(255,255,255,0.04)",
              backdropFilter: "blur(20px)",
              WebkitBackdropFilter: "blur(20px)",
              border: "1px solid rgba(255,255,255,0.09)",
              borderRadius: 18, padding: isMobile ? 10 : 20,
              boxShadow: "0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.07)",
            }}>
              <CastleMap members={members} assignments={assignments} setAssignments={fbSetAssignments} isMobile={isMobile} />
            </div>

            {/* Join Rally + Garrison Support side by side, then strategy guide */}
            <div style={{ marginTop: 16 }}>
              <BattleGuide />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
